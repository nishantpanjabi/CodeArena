# =============================================
#  CodeArena — Docker Compose
# =============================================
# Usage:
#   cp .env.example .env        # fill in values
#   docker compose up --build   # start everything
# =============================================

services:
  # ---------- MySQL ----------
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: codestorm
    ports:
      - "127.0.0.1:${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ---------- Code Execution Sandbox ----------
  sandbox:
    build: ./backend/sandbox
    image: devhacks-sandbox
    container_name: devhacks-sandbox-persistent
    privileged: true
    network_mode: "none"
    mem_limit: 2g
    cpus: 2.0
    # cgroupns: host   # uncomment on Linux for cgroup v2 support
    restart: unless-stopped
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: ["sleep", "infinity"]

  # ---------- Spring Boot Backend ----------
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      sandbox:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TZ: Asia/Kolkata
      JAVA_OPTS: "-Duser.timezone=Asia/Kolkata"
      DB_URL: jdbc:mysql://db:3306/codestorm?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OAUTH_ENABLED: ${OAUTH_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      OAUTH_SUCCESS_REDIRECT: ${OAUTH_SUCCESS_REDIRECT:-http://localhost:5173/oauth2/callback}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Set SPRING_PROFILES_ACTIVE=oauth in .env to enable Google login
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    volumes:
      # Backend needs Docker CLI access to manage the sandbox container
      - /var/run/docker.sock:/var/run/docker.sock

  # ---------- React Frontend ----------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-http://localhost:8080/api}
        VITE_OAUTH_ENABLED: ${VITE_OAUTH_ENABLED:-false}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:5173:80"

volumes:
  mysql_data:
