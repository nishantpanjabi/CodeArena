spring.application.name=backend

# ========================
# MySQL Database
# ========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/codestorm?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ========================
# JPA
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Flyway
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
oauth.enabled=${OAUTH_ENABLED:false}
oauth.success-redirect=${OAUTH_SUCCESS_REDIRECT:http://localhost:5173/oauth2/callback}
security.cookie.secure=${COOKIE_SECURE:false}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
mail.enabled=${MAIL_ENABLED:false}


app.upload-dir=uploads
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

app.public-base-url=



# ========================
# Gemini AI (Code Hints)
# ========================
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash