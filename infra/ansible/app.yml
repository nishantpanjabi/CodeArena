- name: Configure App EC2
  hosts: app
  become: true

  vars:
    mysql_mount_path: /data/mysql
    node_exporter_version: "1.8.1"
    app_deploy_path: /opt/codearena
    app_public_ip: "{{ ansible_host }}"

  tasks:
    - name: Install base packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        update_cache: true

    - name: Add Docker apt key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker, Compose, and Nginx
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
          - nginx
        update_cache: true

    - name: Ensure docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Create MySQL mount path
      file:
        path: "{{ mysql_mount_path }}"
        state: directory
        mode: "0755"

    - name: Find MySQL EBS device (NVMe-aware)
      shell: |
        MOUNT_PATH="{{ mysql_mount_path }}"

        # 1. Already mounted at our target path?
        mounted=$(lsblk -rpno NAME,MOUNTPOINT 2>/dev/null | awk -v mp="$MOUNT_PATH" '$2==mp {print $1}' | head -1)
        if [ -n "$mounted" ]; then
          echo "$mounted"
          exit 0
        fi

        # 2. NVMe: Check all NVMe block devices
        for dev in /dev/nvme[0-9]*n[0-9]*; do
          [ -b "$dev" ] || continue
          # Skip root device
          if lsblk -nrpo MOUNTPOINT "$dev" 2>/dev/null | grep -qE '^/$'; then
            continue
          fi
          # Check if any partition/device is mounted somewhere already
          if lsblk -nrpo MOUNTPOINT "$dev" 2>/dev/null | grep -qE '^/'; then
            continue
          fi
          echo "$dev"
          exit 0
        done

        # 3. xvd/sd fallback for non-NVMe instances
        for dev in /dev/xvd[b-z] /dev/sd[b-z]; do
          [ -b "$dev" ] || continue
          if lsblk -nrpo MOUNTPOINT "$dev" 2>/dev/null | grep -qE '^/'; then
            continue
          fi
          echo "$dev"
          exit 0
        done

        exit 0
      register: ebs_device_result
      changed_when: false

    - name: Set mysql_mount_device fact
      set_fact:
        mysql_mount_device: "{{ ebs_device_result.stdout | trim }}"

    - name: Ensure MySQL device was found
      assert:
        that:
          - mysql_mount_device | length > 0
        fail_msg: >
          No suitable EBS device found for MySQL. Ensure the EBS volume is
          attached to the instance and visible via 'lsblk'. On Nitro instances,
          it will appear as /dev/nvme1n1 (not /dev/sdf).

    - name: Check if filesystem already exists on device
      command: blkid -o value -s TYPE "{{ mysql_mount_device }}"
      register: blkid_result
      changed_when: false
      failed_when: false

    - name: Create filesystem if missing
      filesystem:
        fstype: ext4
        dev: "{{ mysql_mount_device }}"
      when: blkid_result.stdout | trim | length == 0

    - name: Mount MySQL data volume
      mount:
        path: "{{ mysql_mount_path }}"
        src: "{{ mysql_mount_device }}"
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    - name: Copy nginx.conf
      copy:
        src: "{{ playbook_dir }}/../../nginx.conf"
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: "0644"

    - name: Ensure Nginx is running
      service:
        name: nginx
        state: restarted
        enabled: true

    # ── node_exporter ──────────────────────────────────────────
    - name: Check if node_exporter is already installed
      stat:
        path: /usr/local/bin/node_exporter
      register: node_exporter_bin

    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz
        mode: "0644"
      when: not node_exporter_bin.stat.exists

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: true
      when: not node_exporter_bin.stat.exists

    - name: Install node_exporter binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        remote_src: true
      when: not node_exporter_bin.stat.exists

    - name: Create node_exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User=nobody
          ExecStart=/usr/local/bin/node_exporter
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true

    # ── First-time App Deployment ──────────────────────────────
    - name: Install git
      apt:
        name: git
        state: present
        update_cache: false

    - name: Create app deploy directory
      file:
        path: "{{ app_deploy_path }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Clone repo (skip if already present)
      git:
        repo: "https://github.com/{{ github_repo }}.git"
        dest: "{{ app_deploy_path }}"
        version: main
        force: false
      become_user: ubuntu
      ignore_errors: true  # Repo may already exist — next task handles that

    - name: Pull latest code if repo already existed
      shell: |
        cd {{ app_deploy_path }}
        git fetch --all
        git checkout main
        git pull origin main
      become_user: ubuntu
      changed_when: false

    - name: Render .env file from template
      template:
        src: "{{ playbook_dir }}/templates/app-env.j2"
        dest: "{{ app_deploy_path }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    - name: First docker compose up (build + start all services)
      shell: |
        cd {{ app_deploy_path }}
        docker compose up --build -d
      changed_when: false

    - name: Show app URL
      debug:
        msg: "🟢 App deployed → http://{{ ansible_host }}"
