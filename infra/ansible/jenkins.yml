- name: Configure Jenkins EC2
  hosts: jenkins
  become: true

  vars:
    node_exporter_version: "1.8.1"
    monitoring_dir: /opt/monitoring
    jenkins_url: "http://localhost:8080/"
    jenkins_cli: "java -jar /opt/jenkins-cli.jar -s {{ jenkins_url }} -webSocket -auth '{{ jenkins_admin_user }}:{{ jenkins_admin_password }}'"
    # Read sonar token generated by sonar.yml (saved to controller's /tmp)
    sonar_token: "{{ lookup('file', '/tmp/sonar_token.txt') }}"
    # Read PEM key content from the Ansible controller (same dir as this playbook)
    app_ec2_pem_key: "{{ lookup('file', playbook_dir + '/shivsharan.pem') }}"

  tasks:
    # ────────────────────────────────────────────────────────────
    # BASE PACKAGES
    # ────────────────────────────────────────────────────────────
    - name: Install base packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        update_cache: true

    - name: Ensure keyrings directory exists
      file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"

    # ── Jenkins Key & Repo ─────────────────────────────────────
    - name: Import Jenkins GPG key directly from keyserver
      shell: |
        gpg --keyserver keyserver.ubuntu.com --recv-keys 7198F4B714ABFC68 && \
        gpg --export 7198F4B714ABFC68 | gpg --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg
      args:
        creates: /usr/share/keyrings/jenkins-keyring.gpg

    - name: Add Jenkins apt repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
        state: present
        filename: jenkins
        update_cache: false

    # ── Docker Key & Repo ──────────────────────────────────────
    - name: Download and dearmor Docker key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /usr/share/keyrings/docker-keyring.gpg
      args:
        creates: /usr/share/keyrings/docker-keyring.gpg

    - name: Get Ubuntu codename
      command: lsb_release -cs
      register: ubuntu_codename
      changed_when: false

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ubuntu_codename.stdout }} stable"
        state: present
        filename: docker
        update_cache: false

    - name: Run full apt-get update
      shell: apt-get update
      changed_when: false

    # ────────────────────────────────────────────────────────────
    # JAVA + JENKINS
    # ────────────────────────────────────────────────────────────
    - name: Install Java 21 JDK (full)
      apt:
        name: openjdk-21-jdk
        state: present
        update_cache: false

    - name: Set Java 21 as default
      alternatives:
        name: java
        path: /usr/lib/jvm/java-21-openjdk-amd64/bin/java

    - name: Install Jenkins and Docker
      apt:
        name:
          - jenkins
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
        update_cache: false

    # ── Skip setup wizard via JAVA_OPTS ───────────────────────
    - name: Ensure Jenkins override directory exists
      file:
        path: /etc/systemd/system/jenkins.service.d
        state: directory
        mode: "0755"

    - name: Configure Jenkins service (skip wizard + set JAVA_HOME)
      copy:
        dest: /etc/systemd/system/jenkins.service.d/override.conf
        content: |
          [Service]
          Environment="JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"
          Environment="PATH=/usr/lib/jvm/java-21-openjdk-amd64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="JAVA_OPTS=-Djenkins.install.runSetupWizard=false"

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    # ── Place init Groovy before first start ──────────────────
    - name: Ensure Jenkins init.groovy.d exists
      file:
        path: /var/lib/jenkins/init.groovy.d
        state: directory
        owner: jenkins
        group: jenkins
        mode: "0750"

    - name: Template security init Groovy script
      template:
        src: "{{ playbook_dir }}/templates/jenkins-init-security.groovy.j2"
        dest: /var/lib/jenkins/init.groovy.d/01_security.groovy
        owner: jenkins
        group: jenkins
        mode: "0640"

    # ────────────────────────────────────────────────────────────
    # START JENKINS (FIRST BOOT — wizard skipped, admin created)
    # ────────────────────────────────────────────────────────────
    - name: Ensure Jenkins is started and enabled
      service:
        name: jenkins
        state: started
        enabled: true

    - name: Wait for Jenkins to come up on port 8080
      wait_for:
        port: 8080
        delay: 15
        timeout: 120

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: true

    # ── Wait until Jenkins API responds ───────────────────────
    - name: Wait for Jenkins to accept API connections
      uri:
        url: "{{ jenkins_url }}login"
        status_code: 200
      register: jenkins_api
      until: jenkins_api.status == 200
      retries: 60
      delay: 10

    # ────────────────────────────────────────────────────────────
    # INSTALL PLUGINS via jenkins-plugin-manager.jar
    # ────────────────────────────────────────────────────────────
    - name: Download Jenkins Plugin Manager
      get_url:
        url: "https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/2.14.0/jenkins-plugin-manager-2.14.0.jar"
        dest: /opt/jenkins-plugin-manager.jar
        mode: "0644"
        force: true

    - name: Install required Jenkins plugins
      shell: |
        java -jar /opt/jenkins-plugin-manager.jar \
          --war /usr/share/java/jenkins.war \
          --plugin-download-directory /var/lib/jenkins/plugins \
          --plugins \
            github:latest \
            sonar:latest \
            ssh-agent:latest \
            ws-cleanup:latest \
            pipeline-stage-view:latest \
            git:latest \
            workflow-aggregator:latest \
            plain-credentials:latest
        chown -R jenkins:jenkins /var/lib/jenkins/plugins
      register: plugin_install
      changed_when: "'Downloaded' in plugin_install.stdout"

    # ────────────────────────────────────────────────────────────
    # GROOVY SCRIPTS (Loaded on next restart)
    # ────────────────────────────────────────────────────────────
    - name: Place SSH credential Groovy script
      template:
        src: "{{ playbook_dir }}/templates/jenkins-credential.groovy.j2"
        dest: /var/lib/jenkins/init.groovy.d/02_credentials.groovy
        owner: jenkins
        mode: "0600"

    - name: Place SonarQube config Groovy script
      template:
        src: "{{ playbook_dir }}/templates/jenkins-sonar.groovy.j2"
        dest: /var/lib/jenkins/init.groovy.d/03_sonar.groovy
        owner: jenkins
        mode: "0600"

    - name: Place pipeline job Groovy script
      template:
        src: "{{ playbook_dir }}/templates/jenkins-job.groovy.j2"
        dest: /var/lib/jenkins/init.groovy.d/04_job.groovy
        owner: jenkins
        mode: "0600"

    - name: Place APP_HOST env Groovy script
      copy:
        dest: /var/lib/jenkins/init.groovy.d/05_env.groovy
        owner: jenkins
        mode: "0600"
        content: |
          import jenkins.model.*
          def instance = Jenkins.getInstance()
          def globalNodeProperties = instance.getGlobalNodeProperties()
          def envVarsNodePropertyList = globalNodeProperties.getAll(hudson.slaves.EnvironmentVariablesNodeProperty.class)
          def envVars
          if (envVarsNodePropertyList.isEmpty()) {
              def newEnvVarsNodeProperty = new hudson.slaves.EnvironmentVariablesNodeProperty()
              globalNodeProperties.add(newEnvVarsNodeProperty)
              envVars = newEnvVarsNodeProperty.getEnvVars()
          } else {
              envVars = envVarsNodePropertyList.get(0).getEnvVars()
          }
          envVars.put("APP_HOST", "{{ app_private_ip }}")
          envVars.put("SONAR_HOST_URL", "http://{{ sonar_private_ip }}:9000")
          instance.save()
          println "✅ APP_HOST set to {{ app_private_ip }}"
          println "✅ SONAR_HOST_URL set to http://{{ sonar_private_ip }}:9000"

    # Restart so plugins and groovy scripts are loaded!
    - name: Restart Jenkins to apply plugins and groovy init scripts
      service:
        name: jenkins
        state: restarted

    - name: Wait for Jenkins to come back up
      wait_for:
        port: 8080
        delay: 20
        timeout: 180

    # Wait until Jenkins API responds after restart (ensures Groovy scripts finished)
    - name: Wait for Jenkins to accept API connections after restart
      uri:
        url: "{{ jenkins_url }}login"
        status_code: 200
      register: jenkins_api_again
      until: jenkins_api_again.status == 200
      retries: 60
      delay: 10

    # ── GitHub Webhook via GitHub API ─────────────────────────
    - name: Create GitHub webhook for Jenkins
      local_action:
        module: uri
        url: "https://api.github.com/repos/{{ github_repo }}/hooks"
        method: POST
        headers:
          Authorization: "Bearer {{ github_token }}"
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        body_format: json
        body:
          name: web
          active: true
          events:
            - push
          config:
            url: "http://{{ ansible_host }}:8080/github-webhook/"
            content_type: json
            insecure_ssl: "0"
        status_code: [201, 422]   # 422 = already exists
      register: webhook_result

    - name: Show webhook result
      debug:
        msg: >
          {% if webhook_result.status == 201 %}
          ✅ GitHub webhook created → http://{{ ansible_host }}:8080/github-webhook/
          {% else %}
          ℹ️  Webhook already exists (422 from GitHub API)
          {% endif %}

    # ────────────────────────────────────────────────────────────
    # node_exporter + Prometheus + Grafana
    # ────────────────────────────────────────────────────────────
    - name: Check if node_exporter is already installed
      stat:
        path: /usr/local/bin/node_exporter
      register: node_exporter_bin

    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz
        mode: "0644"
      when: not node_exporter_bin.stat.exists

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: true
      when: not node_exporter_bin.stat.exists

    - name: Install node_exporter binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        remote_src: true
      when: not node_exporter_bin.stat.exists

    - name: Create node_exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User=nobody
          ExecStart=/usr/local/bin/node_exporter
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true

    - name: Create monitoring provisioning directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ monitoring_dir }}/provisioning/datasources"
        - "{{ monitoring_dir }}/provisioning/dashboards"

    - name: Template prometheus.yml with EC2 private IPs
      template:
        src: "{{ playbook_dir }}/files/prometheus.yml"
        dest: "{{ monitoring_dir }}/prometheus.yml"
        mode: "0644"

    - name: Copy Grafana datasource provisioning
      copy:
        src: "{{ playbook_dir }}/files/grafana-datasource.yml"
        dest: "{{ monitoring_dir }}/provisioning/datasources/prometheus.yml"
        mode: "0644"

    - name: Copy Grafana dashboard provider config
      copy:
        src: "{{ playbook_dir }}/files/grafana-dashboard-provider.yml"
        dest: "{{ monitoring_dir }}/provisioning/dashboards/provider.yml"
        mode: "0644"

    - name: Download Node Exporter Full dashboard JSON (ID 1860)
      get_url:
        url: "https://grafana.com/api/dashboards/1860/revisions/latest/download"
        dest: "{{ monitoring_dir }}/provisioning/dashboards/node-exporter-full.json"
        mode: "0644"
        force: false    # Only download if file doesn't exist yet

    # Patch the dashboard JSON to bind to our Prometheus datasource
    - name: Fix datasource reference in dashboard JSON
      replace:
        path: "{{ monitoring_dir }}/provisioning/dashboards/node-exporter-full.json"
        regexp: '"datasource"\s*:\s*"[^"]*"'
        replace: '"datasource": "Prometheus"'

    - name: Template monitoring Docker Compose file
      template:
        src: "{{ playbook_dir }}/templates/monitoring-compose.yml.j2"
        dest: "{{ monitoring_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Start Prometheus and Grafana (or recreate if config changed)
      shell: |
        docker compose -f {{ monitoring_dir }}/docker-compose.yml down --remove-orphans 2>/dev/null || true
        docker compose -f {{ monitoring_dir }}/docker-compose.yml up -d
      changed_when: false

    # Wait for Grafana to be ready before printing URLs
    - name: Wait for Grafana to come up on port 3000
      wait_for:
        port: 3000
        delay: 5
        timeout: 60

    # ────────────────────────────────────────────────────────────
    # SUMMARY
    # ────────────────────────────────────────────────────────────
    - name: Print access URLs
      debug:
        msg:
          - "🟢 Jenkins     → http://{{ ansible_host }}:8080  ({{ jenkins_admin_user }} / {{ jenkins_admin_password }})"
          - "🟢 SonarQube   → http://{{ hostvars['sonar']['ansible_host'] }}:9000  (admin / {{ sonar_admin_password }})"
          - "🟢 Prometheus  → http://{{ ansible_host }}:9090"
          - "🟢 Grafana     → http://{{ ansible_host }}:3000  (admin / {{ grafana_admin_password }})"
          - "🟢 App         → http://{{ hostvars['app']['ansible_host'] }}"
          - "✅ Node Exporter Full dashboard pre-loaded in Grafana"
          - "✅ Pipeline job 'codearena' created — push to main to trigger a build"