global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'jenkins_node'
    static_configs:
      - targets: ['{{ jenkins_private_ip }}:9100']
        labels:
          instance: 'jenkins'

  - job_name: 'sonar_node'
    static_configs:
      - targets: ['{{ sonar_private_ip }}:9100']
        labels:
          instance: 'sonarqube'

  - job_name: 'app_node'
    static_configs:
      - targets: ['{{ app_private_ip }}:9100']
        labels:
          instance: 'app'
