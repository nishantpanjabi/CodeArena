[jenkins]
jenkins ansible_host=YOUR_JENKINS_PUBLIC_IP ansible_user=ubuntu

[sonar]
sonar ansible_host=YOUR_SONAR_PUBLIC_IP ansible_user=ubuntu

[app]
app ansible_host=YOUR_APP_PUBLIC_IP ansible_user=ubuntu

# ── Vars used by jenkins.yml to template prometheus.yml ──────────
# Fill in the PRIVATE IPs (from AWS console) so Prometheus can scrape
# node_exporter across the VPC without going through the public internet.
[jenkins:vars]
jenkins_private_ip=YOUR_JENKINS_PRIVATE_IP
sonar_private_ip=YOUR_SONAR_PRIVATE_IP
app_private_ip=YOUR_APP_PRIVATE_IP
